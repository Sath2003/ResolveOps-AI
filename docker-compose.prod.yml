version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resolveops-postgres
    environment:
      POSTGRES_USER: resolveopsadmin
      POSTGRES_PASSWORD: local-db-pass
      POSTGRES_DB: resolveopsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      - NODE_ENV=production
    depends_on:
      - api-gateway-service
    restart: always

  api-gateway-service:
    build:
      context: ./services/api-gateway-service
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
    restart: always

  auth-service:
    build:
      context: ./services/auth-service
    env_file:
      - .env
    restart: always

  github-intelligence-service:
    build:
      context: ./services/github-intelligence-service
    env_file:
      - .env
    restart: always

  azure-intelligence-service:
    build:
      context: ./services/azure-intelligence-service
    env_file:
      - .env
    restart: always

  aws-intelligence-service:
    build:
      context: ./services/aws-intelligence-service
    env_file:
      - .env
    restart: always

  ai-rca-service:
    build:
      context: ./services/ai-rca-service
    env_file:
      - .env
    restart: always

  notification-service:
    build:
      context: ./services/notification-service
    env_file:
      - .env
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: resolveops-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: always

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
