version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resolveops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resolveopsadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-db-pass}
      POSTGRES_DB: ${POSTGRES_DB:-resolveopsdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resolveopsadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
      # OPENAI_API_KEY is intentionally NOT passed to the frontend container
    depends_on:
      - api-gateway-service
    restart: unless-stopped

  api-gateway-service:
    build:
      context: ./services/api-gateway-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VISUAL_STORAGE_DIR=/app/data/visuals
    volumes:
      - ./data:/app/data
      - generated_visuals:/app/data/visuals
    depends_on:
      postgres:
        condition: service_healthy
      ai-rca-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: unless-stopped

  github-intelligence-service:
    build:
      context: ./services/github-intelligence-service
    ports:
      - "8002:8000"
    env_file:
      - .env
    restart: unless-stopped

  aws-intelligence-service:
    build:
      context: ./services/aws-intelligence-service
    ports:
      - "8004:8000"
    env_file:
      - .env
    restart: unless-stopped

  mcp-server-service:
    build:
      context: ./services/mcp-server-service
    ports:
      - "8007:8000"
    env_file:
      - .env
    depends_on:
      - aws-intelligence-service
      - github-intelligence-service
      - docker-evidence-adapter
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  docker-evidence-adapter:
    build:
      context: ./services/docker-evidence-adapter
    ports:
      - "8008:8000"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ai-rca-service:
    build:
      context: ./services/ai-rca-service
    ports:
      - "8005:8000"
    env_file:
      - .env
    environment:
      - VISUAL_STORAGE_DIR=/app/data/visuals
      - OPENAI_MODEL=${OPENAI_MODEL_NAME:-gpt-4o-mini}
    volumes:
      - generated_visuals:/app/data/visuals
    depends_on:
      - mcp-server-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
    ports:
      - "8006:8000"
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
  generated_visuals:

